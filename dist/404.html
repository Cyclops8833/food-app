<!doctype html>
<html><head>
<script>
  // Redirect GitHub Pages 404s back to the SPA.
  // Preserves the path so React Router can handle it.
  var l = window.location;
  l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    l.pathname.split('/').slice(0, 2).join('/') +
    '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) + l.hash
  );
</script>
</head></html>
